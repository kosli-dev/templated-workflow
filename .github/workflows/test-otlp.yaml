name: Test otlp Workflow

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - dev

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Run tests
              run: echo "Running tests..." # Replace with actual test commands
            - name: Upload test results
              uses: actions/upload-artifact@v4
              with:
                name: test-results
                path: report.xml
    otel-cicd-action:
        if: always()
        name: OpenTelemetry Export Trace
        runs-on: ubuntu-latest
        needs: [test] # must run when all jobs are completed
        steps:
        - name: Export workflow
          uses: corentinmusard/otel-cicd-action@v4
          with:
            otlpEndpoint: https://ingress.europe-west4.gcp.dash0.com
            otlpHeaders: ${{ secrets.OTLP_HEADERS }}
            githubToken: ${{ secrets.GITHUB_TOKEN }}
